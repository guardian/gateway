allowedStages:
  - CODE
  - PROD
deployments:
  cfn-eu-west-1-identity-identity-gateway:
    type: cloud-formation
    regions:
      - eu-west-1
    stacks:
      - identity
    app: identity-gateway
    contentDirectory: cdk.out
    parameters:
      templateStagePaths:
        CODE: IdentityGateway-CODE.template.json
        PROD: IdentityGateway-PROD.template.json
